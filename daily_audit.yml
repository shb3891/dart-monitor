name: Daily Audit Check

# audit_check.py 실행: 감사보고서 시트 자동 갱신
# - 매일 KST 09:00 (UTC 00:00)
# - 수동 실행 가능
on:
  schedule:
    - cron: '0 0 * * *'  # 매일 KST 09:00
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install gspread google-auth requests python-dateutil
          fi
      
      - name: Run Audit Checker
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SEIBRO_KEY: ${{ secrets.SEIBRO_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python audit_check.py
