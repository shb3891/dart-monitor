name: Hourly Dart Monitor

on:
  schedule:
    # 한국 시간(KST) 오전 9시 ~ 오후 4시까지 매 정각 실행 (UTC 00:00~07:00)
    - cron: '0 0-7 * * *'
  workflow_dispatch: # 원할 때 수동으로 즉시 돌려보는 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install dart-fss pandas python-telegram-bot
      - name: Run Monitoring Bot
        run: python main.py
